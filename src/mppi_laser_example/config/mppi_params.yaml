# ============================================================================
# MPPI Controller Parameters - ROS1 Version
# 节点名称: mppi_ros1_node
# 使用方法: rosparam load mppi_params_namespaced.yaml
# ============================================================================

mppi_ros1_node:
  # 
  # 一、MPPI核心参数
  # 

  # batch_size: 每次优化的采样轨迹数量
  #   - 影响优化精度和计算速度
  #   - 值越大，采样越充分，优化结果越好，但计算时间越长
  #   - 建议范围: 1000-2000
  batch_size: 1500

  # time_steps: 每个轨迹的预测时间步数
  #   - 影响预测范围（预测时长 = time_steps * model_dt）
  #   - 值越大，预测范围越长，但计算量增加
  #   - 建议范围: 50-100
  time_steps: 40

  # model_dt: 模型时间步长（秒）
  #   - 控制轨迹预测的时间精度
  #   - 值越小，精度越高，但计算量增加
  #   - 建议范围: 0.03-0.1
  model_dt: 0.05

  # temperature: 温度参数
  #   - 控制采样轨迹的多样性
  #   - 值越大，探索性越强，收敛速度可能变慢
  #   - 值越小，收敛越快，但可能陷入局部最优
  #   - 建议范围: 0.1-1.0
  temperature: 0.2

  # 自适应温度参数
  adaptive_temperature: True       # 是否启用自适应温度
  adaptive_temperature_min: 0.1     # 自适应温度下限
  adaptive_temperature_max: 1.0     # 自适应温度上限

  # gamma: 控制成本权重
  #   - 平衡控制序列的平滑性和轨迹质量:值大平滑反应慢；值小抖动反应快
  #   - 用于计算控制成本项，惩罚偏离当前控制序列的噪声
  gamma: 0.015

  # iteration_count: 优化迭代次数
  #   - 每次控制周期内的优化迭代次数
  #   - 值越大，优化精度越高，但计算时间增加
  #   - 建议范围: 1-5
  iteration_count: 1

  # control_period_ms: 控制周期（毫秒）
  #   - 控制器的更新频率
  #   - 50ms = 20Hz，是常用的控制频率
  control_period_ms: 50

  # thread_count: 并行计算线程数
  #   - 用于加速轨迹生成和评估
  #   - 建议设置为CPU核心数
  thread_count: 4
  
  # prune_distance: 路径裁剪距离（米）
  #   - 只保留机器人前方指定距离内的路径点
  #   - 影响局部规划的视野范围
  #   - 值越大，考虑的路径越长，但计算量增加
  #   - 建议范围: 2.0-4.0，需与轨迹能力匹配:prune_distance > 轨迹最远可达点 ：向前引导作用；（如果 > 轨迹最远可达点 + offset，就浪费了计算）
  #   - 轨迹时长 = time_steps * model_dt = 35 * 0.05 = 1.75s
  #   - 理论最大距离 = vx_max * 轨迹时长 = 1.2 * 1.75 = 2.1m
  #   - 考虑加速度限制，实际可达约 1.5-2.0m
  prune_distance: 3.5


  # 
  # 二、控制约束
  # 

  # vx_max: 最大线速度（米/秒）
  #   - 机器人前进的最大速度限制
  #   - 根据机器人实际性能设置
  vx_max: 1.2

  # vx_min: 最小线速度（米/秒）
  #   - 设为0.0表示不允许倒车
  #   - 设为负值允许倒车
  vx_min: -0.25

  # vy_max: 最大横向速度（米/秒）
  #   - 仅全向移动模型（Omni）有效
  #   - 差速驱动模型中此参数被忽略
  vy_max: 1.2

  # wz_max: 最大角速度（弧度/秒）
  #   - 机器人旋转的最大速度限制
  #   - 差速小车建议: 2.5-3.0 rad/s
  wz_max: 2.0

  # ax_max: 最大线加速度（米/秒²）
  #   - 限制机器人前进/后退的加速度
  #   - 防止电机过载和打滑
  ax_max: 1.5

  # ay_max: 最大横向加速度（米/秒²）
  #   - 仅全向移动模型有效
  #   - 限制侧向移动的加速度
  ay_max: 1.35

  # az_max: 最大角加速度（弧度/秒²）
  #   - 限制机器人旋转的加速度
  #   - 防止快速转向导致的不稳定
  az_max: 2.5


  # 
  # 三、噪声采样标准差
  # 

  # 这些参数控制MPPI采样时的随机噪声强度
  # 噪声用于生成多样化的候选轨迹

  # vx_std: 线速度噪声标准差（米/秒）
  #   - 控制速度采样的随机性
  #   - 值越大，速度变化范围越大，探索性越强
  vx_std: 0.20

  # vy_std: 横向速度噪声标准差（米/秒）
  #   - 设为0.0表示不添加横向速度噪声
  #   - 差速驱动模型中此参数被忽略
  vy_std: 0.20

  # wz_std: 角速度噪声标准差（弧度/秒）
  #   - 控制转向采样的随机性
  #   - 影响轨迹的转向多样性
  wz_std: 0.30


  # 
  # 四、障碍物代价参数
  # 

  # 这些参数控制机器人如何感知和避开障碍物

  # obstacle_repulsion_weight: 障碍物排斥权重
  #   - 控制障碍物附近排斥力的大小
  #   - 值越大，机器人越倾向于远离障碍物
  obstacle_repulsion_weight: 1.0

  # obstacle_collision_cost: 碰撞代价
  #   - 当轨迹与障碍物发生碰撞时的惩罚值
  #   - 值越大，机器人越避免碰撞
  #   - 通常设置为一个很大的数
  obstacle_collision_cost: 100000.0

  # obstacle_collision_margin: 碰撞边界距离（米）
  #   - 机器人与障碍物的安全距离
  #   - 小于此距离视为碰撞
  obstacle_collision_margin: 0.3

  # collision_cost_threshold: 碰撞代价阈值
  #   - 用于判断最优轨迹是否发生碰撞
  #   - 应低于obstacle_collision_cost
  #   - 建议设为碰撞代价的一半左右
  collision_cost_threshold: 50000.0

  # obstacle_inflation_radius: 障碍物膨胀半径（米）
  #   - 在该范围内产生排斥力
  #   - 增加安全裕度，防止过于接近障碍物
  obstacle_inflation_radius: 0.8

  # obstacle_cost_scaling: 代价缩放因子
  #   - 控制排斥力随距离的衰减速度
  #   - 值越大，排斥力随距离衰减越快
  obstacle_cost_scaling: 4.0

  # obstacle_near_goal_distance: 接近目标时的距离阈值（米）
  #   - 当机器人距离目标小于此值时，忽略障碍物代价
  #   - 便于机器人最终收敛到目标点
  obstacle_near_goal_distance: 0.3

  # robot_radius: 机器人半径（米）
  #   - 用于碰撞检测
  #   - 应设置为机器人外接圆的半径
  #   - 小车0.6x0.45m，外接圆半径约0.375m
  robot_radius: 0.25

  # consider_footprint: 是否考虑机器人足迹
  #   - false: 使用圆形机器人模型（简单快速）
  #   - true: 使用多边形足迹模型（更精确但计算复杂）
  consider_footprint: false

  # footprint: 机器人足迹点列表（可选）
  #   - 当consider_footprint为true时使用
  #   - 格式: [x1, y1, x2, y2, ...]
  #   - 相对于机器人中心定义
  #   - 小车0.6x0.45m: 长0.6m(前后各0.3m)，宽0.45m(左右各0.225m)
  #footprint: [0.30, 0.225, 0.30, -0.225, -0.30, -0.225, -0.30, 0.225]

  # grid_resolution: 栅格地图分辨率（米/栅格）
  #   - 用于局部栅格距离场
  #   - 值越小，精度越高，但计算量增加
  grid_resolution: 0.05

  # grid_width: 栅格地图宽度（栅格数）
  #   - 局部栅格地图的宽度
  #   - 影响障碍物感知的范围
  grid_width: 100

  # grid_height: 栅格地图高度（栅格数）
  #   - 局部栅格地图的高度
  grid_height: 100




  # 
  # 五、阻塞检测参数：阻塞1（用于差速/阿克曼，惩罚一直旋转）/阻塞2（用于全向防止连续自旋）
  # 

  # 用于检测机器人是否被障碍物困住（原地打转），阻塞检测1
  # twirling_weight: 旋转惩罚权重
  #   - 惩罚"低前进+高旋转"的行为
  #   - 值越大，越抑制原地旋转
  twirling_weight: 0.5
  
  # twirling_threshold: 关闭TwirlingCritic的距离阈值（米）
  #   - 当机器人距离目标点小于此值时，关闭TwirlingCritic
  #   - 允许机器人在目标点附近旋转调整朝向
  #   - 与goal_threshold配合使用，确保到达目标时能正确调整朝向
  twirling_threshold: 0.5

  #检测到速度会输出为0    阻塞检测2
  # spinning_ratio_threshold: 旋转比率阈值
  #   - wz/vx比率阈值，超过此值视为打转
  #   - 例如: wz=1.5, vx=0.1, 比率=15 > 8，视为打转
  spinning_ratio_threshold: 8.0

  # spinning_detect_frames: 连续检测帧数
  #   - 连续多少帧检测到打转才触发阻塞
  #   - 防止误判正常的转向行为
  #   - 4帧 = 200ms（按50ms控制周期计算）
  spinning_detect_frames: 8


  # 
  # 六、启动辅助参数(不在MPPI控制器中)
  # 

  # 用于解决机器人在启动时（速度接近0）的困境

  # startup_assist_enabled: 是否启用启动辅助
  #   - true: 启用（默认）
  #   - false: 禁用，完全由MPPI控制速度
  #   - 如果MPPI本身能够正常启动，建议禁用此功能
  startup_assist_enabled: false

  # startup_boost_vx: 启动时的线速度增强值（米/秒）
  #   - 当检测到启动困境时，施加的初始前进速度
  #   - 仅在startup_assist_enabled为true时有效
  startup_boost_vx: 0.06

  # startup_boost_wz_gain: 启动时的角速度增益系数
  #   - 根据朝向误差计算转向速度的增益
  startup_boost_wz_gain: 1.2

  # startup_boost_wz_limit: 启动时的角速度限制（弧度/秒）
  #   - 防止启动时转向过快
  startup_boost_wz_limit: 0.6

  # startup_cmd_vx_eps: 启动命令速度阈值（米/秒）
  #   - 当MPPI输出的vx命令小于此值时，可能触发启动辅助
  startup_cmd_vx_eps: 0.01

  # startup_speed_vx_eps: 启动实际速度阈值（米/秒）
  #   - 当机器人实际速度小于此值时，可能触发启动辅助
  startup_speed_vx_eps: 0.02

  # startup_goal_distance: 启动目标距离阈值（米）
  #   - 距离目标大于此值时才启用启动辅助
  #   - 防止在目标点附近不必要的启动辅助
  startup_goal_distance: 0.3

  # startup_lookahead: 启动时的前瞻步数
  #   - 用于计算目标方向的路径点偏移
  #   - 值越大，看的越远，转向越平滑
  startup_lookahead: 8


  # 
  # 七、路径对齐代价参数
  # 

  # 惩罚轨迹与全局路径的偏离，使机器人沿路径行驶

  # path_align_weight: 路径对齐权重
  #   - 控制轨迹与路径对齐的重要性
  #   - 增大此值可让小车更紧贴路径，解决平行但不贴合问题
  path_align_weight: 15.0

  # path_align_offset: 从最远路径点向前偏移的步数
  #   - 确定路径对齐的参考点位置
  #   - 值越大，参考点越靠前，看的越远
  path_align_offset: 4

  # path_align_threshold: 距离阈值（米）
  #   - 当距离目标小于此值时，不计算路径对齐代价
  #   - 允许机器人在接近目标时更灵活
  path_align_threshold: 0.3

  # path_align_traj_step: 轨迹点采样步长
  #   - 每隔多少个点计算一次路径对齐代价
  #   - 值越小，检查越密集，跟踪越精确
  path_align_traj_step: 1

  # path_align_obstacle_check_radius: 路径对齐障碍物检查半径（米）
  #   - 用于检测路径是否被障碍物阻塞
  #   - 当障碍物距离路径点小于此半径时，认为路径被占据
  #   - 值越大，越容易认为路径被阻塞
  path_align_obstacle_check_radius: 0.15

  # path_align_max_occupancy_ratio: 路径阻塞比例阈值
  #   - 当路径被障碍物占据的比例超过此值时，路径对齐代价失效
  #   - 防止机器人强行通过被阻挡的路径
  path_align_max_occupancy_ratio: 0.45

  # path_align_use_orientations: 是否考虑路径朝向
  #   - false: 仅考虑位置对齐
  #   - true: 同时考虑朝向对齐，惩罚朝向偏差
  path_align_use_orientations: false


  # 
  # 八、路径角度代价参数
  # 

  # 惩罚轨迹终点与路径参考点之间的朝向偏差

  # path_angle_weight: 路径角度权重
  #   - 控制轨迹朝向与路径朝向一致的重要性
  #   - 增大可确保转弯后朝向与路径一致
  path_angle_weight: 5.0

  # path_angle_offset: 从最远路径点向前偏移的步数
  #   - 确定路径角度参考点的位置
  path_angle_offset: 4

  # path_angle_threshold: 距离阈值（米）
  #   - 当距离目标小于此值时，不计算路径角度代价
  path_angle_threshold: 0.3

  # path_angle_max: 最大允许角度偏差（弧度）
  #   - 只有当朝向偏差超过此值时才惩罚
  #   - 减小此值可让小车更快纠正朝向偏差
  path_angle_max: 0.15

  # path_angle_mode: 路径角度模式
  #   - 0: 偏好前进方向（默认）
  #   - 1: 无方向偏好（允许倒车）
  #   - 2: 考虑路径朝向（根据速度方向选择参考朝向）
  path_angle_mode: 0


  # 
  # 九、路径跟随代价参数
  # 

  # 惩罚轨迹终点与路径上参考点之间的距离

  # path_follow_weight: 路径跟随权重
  #   - 控制轨迹终点接近路径参考点的重要性
  #   - 增大可让轨迹终点更准确地落在路径上
  path_follow_weight: 8.0

  # path_follow_offset: 从最远路径点向前偏移的步数
  #   - 确定路径跟随的参考点位置
  path_follow_offset: 4

  # path_follow_threshold: 距离阈值（米）
  #   - 当距离目标小于此值时，不计算路径跟随代价
  path_follow_threshold: 0.4


  # 
  # 十、目标点代价参数
  # 

  # 当接近目标时，惩罚轨迹与目标点的偏差

  # goal_weight: 目标点权重
  #   - 控制轨迹终点接近目标点的重要性
  #   - 只在距离目标较近时激活
  goal_weight: 5.0

  # goal_threshold: 距离阈值（米）
  #   - 当距离目标小于此值时，激活目标点代价
  #   - 值越大，越早开始精确对准目标
  goal_threshold: 0.8

  # goal_angle_weight: 目标角度权重
  #   - 控制轨迹终点朝向与目标朝向一致的重要性
  goal_angle_weight: 3.0

  # goal_angle_threshold: 距离阈值（米）
  #   - 当距离目标小于此值时，激活目标角度代价
  goal_angle_threshold: 0.6


  # 
  # 十一、偏好前进代价参数
  # 

  # 惩罚倒车行为，鼓励机器人前进

  # prefer_forward_weight: 前进偏好权重
  #   - 控制对倒车行为的惩罚强度
  #   - 值越大，越抑制倒车
  prefer_forward_weight: 3.0

  # prefer_forward_threshold: 距离阈值（米）
  #   - 当距离目标大于此值时，激活前进偏好代价
  #   - 在目标点附近允许更灵活的行为
  prefer_forward_threshold: 0.5


  # 
  # 十二、约束代价参数
  # 

  # 惩罚超出运动学约束的行为

  # constraint_weight: 约束代价权重
  #   - 控制对违反约束行为的惩罚强度
  #   - 惩罚超出速度限制、加速度限制的行为
  constraint_weight: 3.0

  # motion_model_type: 运动模型类型
  #   - 0: 差速驱动（DiffDrive）
  #   - 1: 全向移动（Omni）
  #   - 2: 阿克曼转向（Ackermann）
  motion_model_type: 0


  # 
  # 十三、速度死区代价参数
  # 

  # 惩罚速度过低的行为，避免机器人在低速时的不稳定

  # velocity_deadband_weight: 速度死区权重
  #   - 控制对低速行为的惩罚强度
  velocity_deadband_weight: 0.5

  # velocity_deadband_vx: 线速度死区阈值（米/秒）
  #   - 当线速度低于此值时产生惩罚
  velocity_deadband_vx: 0.05

  # velocity_deadband_vy: 横向速度死区阈值（米/秒）
  #   - 仅全向模型有效
  velocity_deadband_vy: 0.05

  # velocity_deadband_wz: 角速度死区阈值（弧度/秒）
  #   - 当角速度低于此值时产生惩罚
  velocity_deadband_wz: 0.1


  # 
  # 十四、SG滤波器参数
  # 

  # Savitzky-Golay滤波器用于平滑控制序列

  # use_sg_filter: 是否启用SG滤波器
  #   - false: 禁用（默认）
  #   - true: 启用，对控制序列进行平滑处理
  #   - 可以减少控制输出的抖动，使运动更平滑
  use_sg_filter: true

  # shift_control_sequence: 是否启用控制序列时序平滑
  #   - false: 禁用（默认）
  #   - true: 启用，对控制序列进行时序平滑
  shift_control_sequence: false

  # retry_attempt_limit: fallback重试次数限制
  #   - 当所有轨迹都碰撞时，尝试重试的次数
  #   - 值越大，重试次数越多，但计算时间增加
  retry_attempt_limit: 2

  # use_mean_normalization: 是否使用均值归一化
  #   - false: 使用min归一化（默认）
  #   - true: 使用均值归一化
  use_mean_normalization: false


  # 
  # 十五、运动模型参数
  # 

  # 定义机器人的运动学模型

  # motion_model: 运动模型类型
  #   - "DiffDrive": 差速驱动模型（两轮差速）
  #   - "Omni": 全向移动模型（麦克纳姆轮等）
  #   - "Ackermann": 阿克曼转向模型（汽车式转向）
  motion_model: "DiffDrive"

  # ackermann_min_turning_radius: 最小转弯半径（米）
  #   - 仅阿克曼模型有效
  #   - 限制车辆的最小转弯半径
  #   - 根据车辆实际尺寸设置
  ackermann_min_turning_radius: 0.3


  # 
  # 十六、全向/差速模式自动切换参数
  # 

  # 当机器人具备全向移动能力时，可以启用此功能
  # 在障碍物附近或偏离路径时自动切换到全向模式，利用横向移动优势
  # 回到正常路径后再恢复差速模式，提高运动效率

  # enable_omni_switching: 是否启用全向/差速自动切换
  #   - false: 禁用（默认），始终使用基础运动模型
  #   - true: 启用，根据环境自动切换
  enable_omni_switching: false

  # omni_trigger_obstacle_dist: 触发全向模式的障碍物距离阈值（米）
  #   - 当最近障碍物距离小于此值时，切换到全向模式
  #   - 值越小，越容易触发全向模式
  #   - 建议范围: 0.3-0.8米
  omni_trigger_obstacle_dist: 0.9

  # omni_trigger_path_deviation: 触发全向模式的路径偏离阈值（米）
  #   - 当机器人偏离路径超过此值时，切换到全向模式
  #   - 利用全向移动快速回到路径
  #   - 建议范围: 0.2-0.5米
  omni_trigger_path_deviation: 0.3

  # diff_restore_path_threshold: 恢复差速模式的路径偏离阈值（米）
  #   - 当机器人回到路径且偏离小于此值时，恢复差速模式
  #   - 应小于 omni_trigger_path_deviation，避免频繁切换
  #   - 建议范围: 0.1-0.3米
  diff_restore_path_threshold: 0.20

  # omni_switch_delay_frames: 模式切换延迟帧数
  #   - 连续多少帧满足条件才执行切换，防止频繁切换
  #   - 3帧 = 150ms（按50ms控制周期计算）
  #   - 建议范围: 2-5帧
  omni_switch_delay_frames: 3



