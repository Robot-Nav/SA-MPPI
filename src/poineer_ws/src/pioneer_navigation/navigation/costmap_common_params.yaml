obstacle_range: 2.5
raytrace_range: 3.0
footprint: [[-0.24, -0.22], [-0.24, 0.22], [0.24, 0.22], [0.24, -0.22]]
inflation_radius: 0.55
transform_tolerance: 0.5

observation_sources: scan

scan:
  data_type: LaserScan
  topic: scan
  marking: true
  clearing: true
  # 添加期望更新率参数 - 根据您的激光雷达实际频率设置
  expected_update_rate: 0.1  # 如果激光雷达是5Hz，设为0.2秒；如果是10Hz，设为0.1秒
  obstacle_range: 2.5
  raytrace_range: 3.0
  sensor_frame: laser_link
  # 可选：设置最小和最大障碍物高度
  min_obstacle_height: 0.0
  max_obstacle_height: 2.0

map_type: costmap
