TebLocalPlannerROS:

  # ----- 里程计和坐标系设置 -----
  odom_topic: odom                # 里程计话题名称，用于获取机器人速度信息
  map_frame: map                   # 地图坐标系名称

  # ----- 轨迹参数 -----
  teb_autosize: True               # 是否自动调整轨迹点数量（True为自动）
  dt_ref: 0.3                      # 期望的轨迹点时间间隔（秒）
  dt_hysteresis: 0.1               # 时间间隔的滞后阈值，用于避免频繁调整
  global_plan_overwrite_orientation: True  # 是否覆盖全局路径的朝向信息
  max_global_plan_lookahead_dist: 1.5      # 考虑全局路径的最大前瞻距离（米）
  feasibility_check_no_poses: 2    # 进行可行性检查的轨迹点数量

  # ----- 机器人运动学参数 -----
  cmd_angle_instead_rotvel: True    # True：使用角度命令，False：使用角速度命令
  max_vel_x: 0.5                    # 最大前进线速度（米/秒）
  max_vel_x_backwards: 0.2          # 最大后退线速度（米/秒）
  max_vel_theta: 0.3              # 最大角速度（弧度/秒）- 这里修改为0.01
  acc_lim_x: 1.5                    # 最大线加速度（米/秒²）
  acc_lim_theta: 1.1                 # 最大角加速度（弧度/秒²）
  min_turning_radius: 0.6           # 最小转弯半径（米）
  wheelbase: 0.45                    # 机器人轴距（米）- 适用于差速驱动

  # ----- 机器人足迹模型 -----
  footprint_model:                  # 机器人外形模型
    type: "line"                    # 类型："point"(点), "circular"(圆), "two_circles"(双圆), "line"(线), "polygon"(多边形)
    line_start: [-0.135, 0.0]       # 线的起点坐标 [x, y]（米）
    line_end: [0.135, 0.0]          # 线的终点坐标 [x, y]（米）

  # ----- 目标点容差 -----
  xy_goal_tolerance: 0.3            # 目标点XY坐标容差（米）
  yaw_goal_tolerance: 0.1           # 目标点朝向容差（弧度）
  free_goal_vel: False              # 到达目标后是否允许有速度（False表示必须停止）

  # ----- 障碍物参数 -----
  min_obstacle_dist: 0.25           # 距离障碍物的最小安全距离（米）
  include_costmap_obstacles: True   # 是否包含代价地图中的障碍物
  costmap_obstacles_behind_robot_dist: 0.35  # 考虑机器人后方障碍物的距离（米）
  obstacle_poses_affected: 20       # 受障碍物影响的轨迹点数量
  costmap_converter_plugin: ""      # 代价地图转换插件（空表示不使用）
  costmap_converter_spin_thread: True  # 是否启用转换插件的独立线程
  costmap_converter_rate: 5          # 转换插件的更新频率（Hz）

  # ----- 优化参数 -----
  no_inner_iterations: 5             # 每次外迭代中的内迭代次数
  no_outer_iterations: 4             # 优化循环的外迭代次数
  optimization_activate: True        # 是否激活优化
  optimization_verbose: False        # 是否输出详细优化信息
  penalty_epsilon: 0.1               # 惩罚函数的边界阈值

  # ----- 优化权重系数 -----
  weight_max_vel_x: 2                # 最大线速度约束的权重
  weight_max_vel_theta: 1            # 最大角速度约束的权重
  weight_acc_lim_x: 1                # 线加速度约束的权重
  weight_acc_lim_theta: 1            # 角加速度约束的权重
  weight_kinematics_nh: 1000         # 非完整运动学约束的权重
  weight_kinematics_forward_drive: 1 # 前向运动约束的权重（防止倒车）
  weight_kinematics_turning_radius: 1 # 转弯半径约束的权重
  weight_optimaltime: 1              # 最优时间代价的权重
  weight_obstacle: 50                 # 障碍物约束的权重
  weight_dynamic_obstacle: 10         # 动态障碍物约束的权重（尚未使用）
  selection_alternative_time_cost: False  # 是否使用替代的时间成本函数

  # ----- 同伦类规划器参数（多路径规划）-----
  enable_homotopy_class_planning: False   # 是否启用同伦类规划（多路径探索）
  enable_multithreading: False            # 是否启用多线程
  simple_exploration: False               # 是否使用简单的探索策略
  max_number_classes: 4                   # 最大同伦类数量
  roadmap_graph_no_samples: 15            # 路径图采样的数量
  roadmap_graph_area_width: 5              # 路径图区域的宽度（米）
  h_signature_prescaler: 0.5               # 同伦类签名的缩放因子
  h_signature_threshold: 0.1               # 同伦类签名的阈值
  obstacle_keypoint_offset: 0.1            # 障碍物关键点的偏移量
  obstacle_heading_threshold: 0.45         # 障碍物朝向阈值
  visualize_hc_graph: False                 # 是否可视化同伦类图
