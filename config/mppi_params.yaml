mppi_ros2_node:
  ros__parameters:
    # MPPI核心参数
    batch_size: 1300
    time_steps: 90
    model_dt: 0.05
    temperature: 0.3
    gamma: 0.015
    iteration_count: 1
    control_period_ms: 50
    thread_count: 4

    # 控制约束
    vx_max: 0.3
    vx_min: 0.0
    vy_max: 0.5
    wz_max: 2.2
    ax_max: 1.6
    ay_max: 2.0
    az_max: 3.2

    # 噪声采样标准差
    vx_std: 0.15
    vy_std: 0.0
    wz_std: 0.30

    # 障碍物代价参数
    obstacle_repulsion_weight: 0.2
    obstacle_critical_weight: 10.0
    obstacle_collision_cost: 10000.0
    obstacle_collision_margin: 0.1
    collision_cost_threshold: 5000.0
    obstacle_inflation_radius: 0.2
    obstacle_cost_scaling: 3.0
    obstacle_near_goal_distance: 0.3
    robot_radius: 0.08
    consider_footprint: false
    grid_resolution: 0.05
    grid_width: 100
    grid_height: 100

    # 阻塞检测参数
    twirling_weight: 0.5
    spinning_ratio_threshold: 8.0
    spinning_detect_frames: 4

    # 启动辅助参数
    startup_boost_vx: 0.06
    startup_boost_wz_gain: 1.2
    startup_boost_wz_limit: 0.6
    startup_cmd_vx_eps: 0.01
    startup_speed_vx_eps: 0.02
    startup_goal_distance: 0.3
    startup_lookahead: 8

    # 路径对齐代价参数
    path_align_weight: 6.0
    path_align_offset: 20
    path_align_threshold: 0.4
    path_align_traj_step: 4
    path_align_max_occupancy_ratio: 0.0
    path_align_use_orientations: false

    # 路径角度代价参数
    path_angle_weight: 2.0
    path_angle_offset: 4
    path_angle_threshold: 0.4
    path_angle_max: 0.5
    path_angle_mode: 0

    # 路径跟随代价参数
    path_follow_weight: 4.0
    path_follow_offset: 5
    path_follow_threshold: 0.6

    # 目标点代价参数
    goal_weight: 5.0
    goal_threshold: 1.0
    goal_angle_weight: 3.0
    goal_angle_threshold: 0.4

    # 偏好前进代价参数
    prefer_forward_weight: 5.0
    prefer_forward_threshold: 0.5

    # 约束代价参数
    constraint_weight: 4.0
    motion_model_type: 0

    # 速度死区代价参数
    velocity_deadband_weight: 1.0
    velocity_deadband_vx: 0.05
    velocity_deadband_vy: 0.05
    velocity_deadband_wz: 0.1

    # SG滤波器参数
    use_sg_filter: false

    # 运动模型参数
    motion_model: "DiffDrive"
    ackermann_min_turning_radius: 0.2

